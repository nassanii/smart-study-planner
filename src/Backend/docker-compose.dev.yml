services:
  postgres:
    image: postgres:16-alpine
    container_name: ssp-postgres
    environment:
      POSTGRES_DB: ssp_dev
      POSTGRES_USER: ssp
      POSTGRES_PASSWORD: ssp_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ssp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssp -d ssp_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ssp_postgres_data:
